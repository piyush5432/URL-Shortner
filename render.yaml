services:
  - type: web
    name: url-shortener-api
    runtime: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    rootDir: ./Backend
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: urlshortener-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://url-shortener-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://piyush5432.github.io

databases:
  - name: urlshortener-db
    plan: free
    databaseName: urlshortener
    ipAllowList: []
