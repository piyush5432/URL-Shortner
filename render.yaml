services:
  - type: web
    name: url-shortener-api
    plan: free
    region: oregon
    buildCommand: cd Backend && ./mvnw clean install -DskipTests
    startCommand: cd Backend && java -jar target/url-shortener-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: urlshortener-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://url-shortener-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://piyush5432.github.io

databases:
  - name: urlshortener-db
    plan: free
    databaseName: urlshortener
    ipAllowList: []
