services:
  - type: web
    name: url-shortener-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    ports:
      - 8080
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: urlshortener-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://url-shortener-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://piyush5432.github.io
